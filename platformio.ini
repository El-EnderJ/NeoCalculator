; ═══════════════════════════════════════════════════════════════════
; PlatformIO Configuration — NumOS Calculadora Científica
; Target  : ESP32-S3 N16R8 CAM  (16 MB QIO Flash + 8 MB OPI PSRAM)
; GUI     : LVGL 9.x  (Fase 4 – Revolución Visual)
; Driver  : TFT_eSPI  (ST7789 o ILI9341)
; Framework: Arduino
; ═══════════════════════════════════════════════════════════════════

; Ruta de build sin caracteres no-ASCII para evitar problemas del
; linker de Xtensa en Windows (la ó del path causa error de codificación)
[platformio]
build_dir = C:\.piobuild\numOS

[env:esp32s3_n16r8]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Monitor (UART externo — chip puente USB-UART) ───────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
monitor_rts     = 1
monitor_dtr     = 1

; ── Upload ───────────────────────────────────────────────────────
upload_speed = 921600

; ── ESP32-S3 N16R8 CAM: 16 MB QIO Flash + 8 MB OPI PSRAM ────────
board_build.arduino.memory_type = qio_opi           ; Quad Flash + Octal PSRAM
board_build.flash_mode          = qio               ; QIO — compatible con Flash Quad de la CAM
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv  ; Tabla de particiones para 16 MB
board_build.filesystem          = littlefs           ; Sistema de archivos para persistencia

; ── Build flags ──────────────────────────────────────────────────
build_unflags = -std=gnu++11

build_flags =
    ; --- C++17 (necesario para std::make_unique, etc.) ----------
    -std=gnu++17

    ; --- PSRAM 8 MB OPI (ESP32-S3) --------------------------------
    -DBOARD_HAS_PSRAM

    ; --- USB desactivado: usamos UART0 física (chip puente externo) --
    ; Con USB_MODE=0 y CDC_ON_BOOT=0, Serial = UART0 (TX0/RX0),
    ; igual que un DevKit v1.  El monitor no se desconecta tras flash.
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

    ; --- TFT_eSPI: Driver de pantalla ---------------------------
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1

    ; Resolución física del panel (portrait nativo)
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

    ; --- FIX CRÍTICO: SPI_PORT para ESP32-S3 -----------------------
    ; ESP-IDF define REG_SPI_BASE(i) = (i>=2) ? addr : 0
    ; TFT_eSPI por defecto usa FSPI=0 → REG_SPI_BASE(0)=0 → CRASH!
    ; USE_FSPI_PORT fuerza SPI_PORT=2 → REG_SPI_BASE(2)=0x60024000 ✓
    -DUSE_FSPI_PORT

    ; --- Pines SPI — ESP32-S3 CAM ----------------------------------
    -DTFT_MISO=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=4
    -DTFT_RST=5
    -DTFT_BL=45
    -DTFT_BACKLIGHT_ON=1

    ; Silenciar warnings de pines no usados (sin táctil)
    -DTOUCH_CS=-1

    ; Fuentes TFT_eSPI (las apps heredadas aún las usan)
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

    ; SPI a 40 MHz (ILI9341 soporta hasta 66 MHz write; 40 es seguro con FSPI ESP32-S3)
    ; Con buffer PSRAM de 120 KB y 40 MHz → ~24 ms/full flush → >40 FPS.
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000

    ; --- LVGL 9.x ------------------------------------------------
    -DLV_CONF_INCLUDE_SIMPLE
    -I src                      ; Para que encuentre lv_conf.h
    ; Definir las constantes de ASM de LVGL para que el preprocesador del
    ; ensamblador Xtensa evalúe correctamente el guard del archivo
    ; lv_blend_helium.S: #if LV_USE_DRAW_SW_ASM == LV_DRAW_SW_ASM_HELIUM
    ; Con LV_USE_DRAW_SW_ASM=0 (NONE) y LV_DRAW_SW_ASM_HELIUM=2, la
    ; condición es falsa y el código ARM no se ensambla.
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_DRAW_SW_ASM_NONE=0
    -DLV_DRAW_SW_ASM_NEON=1
    -DLV_DRAW_SW_ASM_HELIUM=2

    ; --- Debug ---------------------------------------------------
    -DCORE_DEBUG_LEVEL=1

    ; --- CAS-Lite tests (uncomment to enable) -------
    ; -DCAS_RUN_TESTS

; ── Build sources ─────────────────────────────────────────────
; CAS tests only compiled when -DCAS_RUN_TESTS is active
build_src_filter =
    +<*>
    ; +<../tests/CASTest.cpp>
    ; +<../tests/SymExprTest.cpp>
    ; +<../tests/ASTFlatExprTest.cpp>
    ; +<../tests/SymDiffTest.cpp>
    ; +<../tests/OmniSolverTest.cpp>
    ; +<../tests/CalculusStressTest.cpp>

; ── Dependencias ─────────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI
    lvgl/lvgl@^9.2.0


; ═══════════════════════════════════════════════════════════════════
; Entorno de simulación nativa en PC  (SDL2 + LVGL)
;
; Lanza CalculationApp directamente en una ventana SDL2 de 320×240.
; No requiere hardware ESP32.
;
; Requisitos:
;   · SDL2 development libraries instaladas en el sistema
;     - Windows (MinGW): descargar SDL2-devel-x.x.x-mingw.zip
;       de https://github.com/libsdl-org/SDL/releases
;       extraer a C:\SDL2\ (ajusta las rutas abajo)
;     - Linux:   sudo apt install libsdl2-dev
;     - macOS:   brew install sdl2
;
; Compilar:   pio run -e emulator_pc
; Ejecutar:   .pio\build\emulator_pc\program.exe   (Windows)
;             .pio/build/emulator_pc/program        (Linux/macOS)
; ═══════════════════════════════════════════════════════════════════

[env:emulator_pc]
platform = native
build_flags =
    ; --- Identificador de plataforma ---
    -D NATIVE_SIM
    -D _USE_MATH_DEFINES

    ; --- C++17 ---
    -std=c++17

    ; --- LVGL ---
    -D LV_CONF_INCLUDE_SIMPLE
    -I src

    ; Desactivar ASM de LVGL (no hay Xtensa/ARM en x86)
    -D LV_USE_DRAW_SW_ASM=0
    -D LV_DRAW_SW_ASM_NONE=0
    -D LV_DRAW_SW_ASM_NEON=1
    -D LV_DRAW_SW_ASM_HELIUM=2

    ; --- SDL2 -----------------------------------------------------------
    ; Ajusta estas rutas a tu instalación local de SDL2.
    ; Windows MinGW x86_64 (típica tras extraer SDL2-devel-mingw):
    -IC:/SDL2/x86_64-w64-mingw32/include
    -LC:/SDL2/x86_64-w64-mingw32/lib
    -lmingw32
    -lSDL2main
    -lSDL2

    ; Linux / macOS (descomenta y ajusta si no estás en Windows):
    ; -lSDL2

lib_deps =
    lvgl/lvgl@^9.2.0

; Solo compilar los módulos compatibles con PC (sin TFT_eSPI, GPIO, etc.)
build_src_filter =
    +<hal/*>
    +<apps/CalculationApp.cpp>
    +<input/LvglKeypad.cpp>
    +<input/KeyboardManager.cpp>
    +<math/MathAST.cpp>
    +<math/CursorController.cpp>
    +<math/MathEvaluator.cpp>
    +<math/VariableManager.cpp>
    +<ui/StatusBar.cpp>
    +<ui/MathRenderer.cpp>
    +<ui/SplashScreen.cpp>
    +<ui/MainMenu.cpp>